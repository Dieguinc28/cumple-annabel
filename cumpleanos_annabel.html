<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Cumpleaños Annabel</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
overflow:hidden;

background:linear-gradient(270deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
background-size:600% 600%;
animation:fondo 12s ease infinite;
}

@keyframes fondo{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.card-container{
perspective:1500px;
width:380px;
height:550px;
}

.card{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
cursor:pointer;
}

/* PORTADA */

.card-cover{

position:absolute;
width:100%;
height:100%;
border-radius:15px;

background:linear-gradient(135deg,#ff4081,#c2185b);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;
text-align:center;

transform-origin:left;
transition:transform 1.2s;

box-shadow:0 10px 30px rgba(0,0,0,0.4);
backface-visibility:hidden;

z-index:2;
}

.card-cover h2{
font-family:'Pacifico',cursive;
font-size:2.4rem;
margin:0;
}

.card-cover p{
margin-top:10px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

.card.open .card-cover{
transform:rotateY(-100deg);
}

/* INTERIOR */

.card-inside{

position:absolute;
width:100%;
height:100%;

background:white;

border-radius:15px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

padding:25px;

box-sizing:border-box;

box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* FOTO */

.photo-container{

width:150px;
height:150px;

border-radius:50%;
overflow:hidden;

border:5px solid #ff4081;

margin-bottom:20px;

transform:scale(0);

transition:1s;

}

.card.open .photo-container{
transform:scale(1);
}

.photo-container img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXTO */

h1{
font-family:'Pacifico',cursive;
color:#d81b60;
font-size:2.2rem;
margin:10px 0;
}

#mensaje{
color:#880e4f;
font-size:1.1rem;
line-height:1.6;
max-width:280px;
min-height:80px;
}

/* GLOBOS */

.balloon{
position:absolute;
font-size:30px;
animation:flotar 6s infinite ease-in-out;
opacity:0;
}

.card.open .balloon{
opacity:1;
}

.b1{left:5%;top:80%}
.b2{right:5%;top:75%}
.b3{left:10%;top:60%}
.b4{right:10%;top:65%}

@keyframes flotar{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

/* CONFETI */

.confetti{
position:absolute;
width:8px;
height:14px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
}
}

</style>
</head>

<body>

<div class="card-container">

<div class="card" id="card">

<!-- PORTADA -->

<div class="card-cover">

<h2>🎁 Sorpresa para Annabel</h2>
<p>Toca para abrir</p>

</div>

<!-- INTERIOR -->

<div class="card-inside">

<div class="balloon b1">🎈</div>
<div class="balloon b2">🎈</div>
<div class="balloon b3">✨</div>
<div class="balloon b4">🎉</div>

<div class="photo-container">
<img src="foto.jpg">
</div>

<h1>Feliz Cumpleaños Annabel</h1>

<p id="mensaje"></p>

</div>

</div>

</div>

<audio id="musica" src="cumple.mp3"></audio>

<script>

const card=document.getElementById("card")
const musica=document.getElementById("musica")
const mensaje=document.getElementById("mensaje")

let abierto=false

const texto="Que este nuevo año de vida esté lleno de felicidad, risas, sueños cumplidos y momentos inolvidables. ¡Disfruta muchísimo tu día especial!"

card.onclick=()=>{

card.classList.toggle("open")

if(!abierto){

musica.play()
escribirMensaje()
confeti()

abierto=true

}

}

function escribirMensaje(){

let i=0

function escribir(){

if(i<texto.length){

mensaje.innerHTML+=texto.charAt(i)
i++

setTimeout(escribir,40)

}

}

escribir()

}

function confeti(){

const colores=["#ff4081","#ffd54f","#4fc3f7","#ba68c8","#ff8a65"]

for(let i=0;i<120;i++){

let conf=document.createElement("div")

conf.className="confetti"

conf.style.left=Math.random()*100+"vw"

conf.style.background=colores[Math.floor(Math.random()*colores.length)]

conf.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(conf)

setTimeout(()=>conf.remove(),5000)

}

}

</script>

</body>
</html>
